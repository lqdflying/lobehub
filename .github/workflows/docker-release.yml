name: Build and Push Docker Image

permissions:
  contents: read

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: ${{ github.ref }}-docker-release
  cancel-in-progress: true

env:
  REGISTRY_IMAGE: lqdflying/lobehub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize disk space and add swap
        run: |
          sudo swapoff -a || true
          sudo fallocate -l 8G /swapfile2
          sudo chmod 600 /swapfile2
          sudo mkswap /swapfile2
          sudo swapon /swapfile2
          free -h
          sudo sysctl -w fs.file-max=65536

      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure Docker daemon ulimits
        run: |
          sudo mkdir -p /etc/docker
          echo '{"default-ulimits":{"nofile":{"Name":"nofile","Hard":65536,"Soft":65536}}}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            FEATURE_FLAGS=+commercial_hide_docs
          cache-from: type=gha
          cache-to: type=gha,mode=max
